# ============================================================================
# DisierTECH OpenClaw Stack — Docker Compose
# https://disier.tech
# ============================================================================
#
# Usage:
#   1. Copy .env.example to .env and set your SECRET_KEY
#   2. Run: docker compose up -d
#   3. Logs: docker compose logs -f openclaw
#
# ============================================================================

services:
  openclaw:
    image: openclaw/gateway:latest
    container_name: openclaw_agent
    restart: unless-stopped

    # Host networking simplifies port binding for webhooks and the dashboard.
    # Change to bridge mode if you need network isolation.
    network_mode: "host"

    volumes:
      # Persist agent identity, API keys, and configuration
      - ~/.openclaw:/root/.openclaw

      # Agent's working directory (files created/modified by the agent)
      - ./workspace:/root/workspace

    environment:
      - NODE_ENV=production
      - AGENT_secret_key=${SECRET_KEY}

    # Resource limits — prevents the container from crashing the entire VPS.
    # Adjust based on your instance size:
    #   - 1 GB RAM instance: memory=900M
    #   - 4 GB RAM instance: memory=3G
    #   - 24 GB RAM instance: memory=20G
    deploy:
      resources:
        limits:
          memory: 900M
          cpus: '1.5'
